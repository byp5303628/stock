# ========== 生产环境 ==========
# 启动方式:
#   java -jar stock-web.jar --spring.profiles.active=prod \
#       --spring.config.additional-location=/path/to/application-prod.properties
#
# 或在外部直接指定完整配置文件:
#   java -jar stock-web.jar --spring.config.location=file:/path/to/application-prod.properties
#
# 实际生产环境的 datasource 配置通过外部文件覆盖，示例如下:
# (在外部配置文件中设置)
# spring.datasource.url=jdbc:mysql://生产数据库地址:3306/stock?useSSL=true&...
# spring.datasource.username=生产用户
# spring.datasource.password=生产密码
