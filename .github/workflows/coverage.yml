name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Java + JaCoCo)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo
        run: mvn verify -B -q -DskipTests=false

      - name: Upload JaCoCo reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: >-
            stock-common/target/site/jacoco/jacoco.xml,
            stock-core/target/site/jacoco/jacoco.xml,
            stock-biz/target/site/jacoco/jacoco.xml,
            stock-remote/target/site/jacoco/jacoco.xml,
            stock-web/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: stock-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --passWithNoTests

      - name: Upload Jest coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: stock-frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
